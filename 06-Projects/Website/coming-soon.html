<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .logo {
    width: 160px;
    height: 160px;
    margin-bottom: 40px;
  }

  .sign {
    font-size: 1.4em;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  .sorry {
    font-size: 1em;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    margin-bottom: 48px;
  }

  .sorry span {
    display: inline-block;
    opacity: 0;
    animation: letterIn 0.3s ease forwards;
  }

  @keyframes letterIn {
    from { opacity: 0; transform: rotateX(90deg); }
    to { opacity: 1; transform: rotateX(0deg); }
  }

  .back {
    font-size: 0.85em;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 32px;
    transition: all 0.3s ease;
  }

  .back:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.5);
  }

  @media (max-width: 600px) {
    .logo { width: 120px; height: 120px; margin-bottom: 28px; }
    .sign { font-size: 1em; }
  }
</style>
</head>
<body>

<video class="logo" autoplay loop muted playsinline>
  <source src="42_logo_animated.mp4" type="video/mp4">
</video>

<div class="sign">Site Under Construction</div>
<div class="sorry">Bob says, <span id="sorry-text"></span></div>

<a href="home.html" class="back">Back</a>

<script>
  const text = 'SORRY FOR THE INCONVENIENCE';
  const el = document.getElementById('sorry-text');
  let i = 0;

  function addLetter() {
    if (i < text.length) {
      const span = document.createElement('span');
      span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
      span.style.animationDelay = '0s';
      el.appendChild(span);
      i++;
      setTimeout(addLetter, 120);
    } else {
      setTimeout(() => {
        el.innerHTML = '';
        i = 0;
        addLetter();
      }, 3000);
    }
  }

  addLetter();
</script>

</body>
</html>
