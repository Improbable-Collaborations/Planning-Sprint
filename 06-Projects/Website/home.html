<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitchhikers Guide To Earth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(1px 1px at 5% 12%, #fff, transparent),
      radial-gradient(1px 1px at 12% 45%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1.5px 1.5px at 18% 78%, #fff, transparent),
      radial-gradient(1px 1px at 25% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 32% 65%, rgba(200,220,255,0.6), transparent),
      radial-gradient(1px 1px at 38% 8%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 42% 52%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 48% 88%, #fff, transparent),
      radial-gradient(1px 1px at 55% 22%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 60% 70%, rgba(180,200,255,0.4), transparent),
      radial-gradient(1px 1px at 65% 42%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 72% 15%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 78% 58%, #fff, transparent),
      radial-gradient(1px 1px at 82% 82%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 88% 35%, rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px at 92% 72%, rgba(200,210,255,0.3), transparent),
      radial-gradient(1px 1px at 95% 10%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 3% 90%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 50% 50%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 70% 95%, rgba(255,255,255,0.4), transparent),
      radial-gradient(3px 3px at 15% 60%, rgba(180,190,255,0.15), transparent 3px),
      radial-gradient(4px 4px at 80% 25%, rgba(200,180,255,0.1), transparent 4px),
      radial-gradient(5px 5px at 45% 40%, rgba(180,200,255,0.08), transparent 5px);
    pointer-events: none;
    z-index: 0;
  }

  body > * { position: relative; z-index: 1; }

  /* Earth */
  .earth {
    position: fixed;
    bottom: -60px;
    right: -60px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.85;
    box-shadow: 0 0 60px rgba(80,140,255,0.3), 0 0 120px rgba(80,140,255,0.1);
    z-index: 0;
    pointer-events: none;
  }

  .header {
    text-align: center;
    padding: 48px 20px 32px;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.4em;
    font-weight: 700;
    color: #e74c3c;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .declaration {
    max-width: 700px;
    margin: 32px auto;
    padding: 0 24px;
    text-align: center;
    font-size: 1.2em;
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
  }

  .main {
    display: flex;
    max-width: 900px;
    margin: 48px auto;
    padding: 0 24px;
    gap: 48px;
  }

  .nav-links {
    list-style: none;
    min-width: 220px;
  }

  .nav-links li {
    margin-bottom: 16px;
  }

  .nav-links a {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.95em;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.3s ease;
    display: block;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .nav-links a:hover {
    color: #e74c3c;
  }

  @media (max-width: 600px) {
    .header { padding: 32px 16px 20px; }
    .header h1 { font-size: 1.4em; letter-spacing: 1px; }
    .declaration { font-size: 1em; padding: 0 16px; }
    .main {
      flex-direction: column;
      padding: 0 16px;
      margin: 32px auto;
      gap: 24px;
    }
    .nav-links { min-width: auto; }
    .nav-links a { font-size: 0.85em; }
    .earth { width: 180px; height: 180px; bottom: -40px; right: -40px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Hitchhikers Guide To Earth</h1>
</div>

<div class="declaration">
  [Insert Declaration Text Here]
</div>

<div class="main">
  <ul class="nav-links">
    <li><a href="coming-soon.html">The Story So Far...</a></li>
    <li><a href="coming-soon.html">Vision</a></li>
    <li><a href="coming-soon.html">Wildly Improbable Goals</a></li>
    <li><a href="coming-soon.html">Team</a></li>
    <li><a href="coming-soon.html">Requests for Guidance</a></li>
  </ul>
</div>

<img src="earth.png" class="earth" alt="Earth">

</body>
</html>
