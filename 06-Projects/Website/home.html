<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitchhikers Guide To Earth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield canvas */
  #stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  body > *:not(#stars) { position: relative; z-index: 1; }

  /* Earth */
  .earth {
    position: fixed;
    bottom: -60px;
    right: -60px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.85;
    z-index: 0;
    pointer-events: none;
  }

  .header {
    text-align: center;
    padding: 48px 20px 32px;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.4em;
    font-weight: 700;
    color: #e74c3c;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .declaration {
    max-width: 700px;
    margin: 32px auto;
    padding: 0 24px;
    text-align: center;
    font-size: 1.2em;
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
  }

  .main {
    max-width: 700px;
    margin: 48px auto;
    padding: 0 24px;
  }

  .nav-links {
    list-style: none;
    min-width: 220px;
  }

  .nav-links li {
    margin-bottom: 16px;
  }

  .nav-links a {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.95em;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.3s ease;
    display: block;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .nav-links a:hover {
    color: #e74c3c;
  }

  .back {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85em;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 28px;
    margin: 32px auto;
    transition: all 0.3s ease;
  }

  .back:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.5);
  }

  @media (max-width: 600px) {
    .header { padding: 32px 16px 20px; }
    .header h1 { font-size: 1.4em; letter-spacing: 1px; }
    .declaration { font-size: 1em; padding: 0 16px; }
    .main {
      flex-direction: column;
      padding: 0 16px;
      margin: 32px auto;
      gap: 24px;
    }
    .nav-links { min-width: auto; }
    .nav-links a { font-size: 0.85em; }
    .earth { width: 180px; height: 180px; bottom: -40px; right: -40px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Hitchhikers Guide To Earth</h1>
</div>

<div class="declaration">
  [Insert Declaration Text Here]
</div>

<div class="main">
  <ul class="nav-links">
    <li><a href="coming-soon.html">The Story So Far...</a></li>
    <li><a href="coming-soon.html">Vision</a></li>
    <li><a href="coming-soon.html">Wildly Improbable Goals</a></li>
    <li><a href="coming-soon.html">Team</a></li>
    <li><a href="coming-soon.html">Requests for Guidance</a></li>
  </ul>
  <div style="margin-top:32px;">
    <a href="index.html" class="back">Back</a>
  </div>
</div>

<canvas id="stars"></canvas>
<img src="earth.png" class="earth" alt="Earth">

<script>
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  function draw() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    for (let i = 0; i < 200; i++) {
      const x = Math.random() * c.width;
      const y = Math.random() * c.height;
      const r = Math.random() * 1.5 + 0.3;
      const a = Math.random() * 0.7 + 0.3;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
      ctx.fill();
    }
    // A few faint galaxy-like blurs
    for (let i = 0; i < 5; i++) {
      const x = Math.random() * c.width;
      const y = Math.random() * c.height;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 8);
      grad.addColorStop(0, 'rgba(180,200,255,0.15)');
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }
  draw();
  window.addEventListener('resize', draw);
</script>

</body>
</html>
